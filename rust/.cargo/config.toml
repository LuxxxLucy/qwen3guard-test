# Compile candle and this crate for the CPU running the build.
#
# target-cpu=native handles x86_64 hosts and well-known Arm cores (Apple
# Silicon, Neoverse). On HiSilicon TaiShan (Kunpeng 920) LLVM has no
# tuning model and falls back to a conservative aarch64 feature set —
# `rustc --print cfg -C target-cpu=native` enables sve and fp16 but
# misses i8mm, bf16, dotprod, f32mm/f64mm. Listing them explicitly is a
# no-op where target-cpu=native already enabled them and a real lift
# where it did not.
[build]
rustflags = [
    "-C", "target-cpu=native",
    "-C", "target-feature=+i8mm,+bf16,+dotprod,+fp16fml,+f32mm,+f64mm",
]
